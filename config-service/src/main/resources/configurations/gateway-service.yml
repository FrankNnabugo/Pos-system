server:
  port: 8083

logging:
  level:
    org.springframework.cloud.gateway: TRACE


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: catalog-service
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/api/v1/catalog/**
          filters:
            - name: CircuitBreaker
              args:
                name: catalog-service
                fallbackUri: forward:/api/v1/fallback/catalog

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - path =/api/v1/inventory/**
          filters:
              - name: CircuitBreaker
                args:
                  name: inventory-service
                  fallbackUri: forward:/api/v1/fallback/inventory




  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8280/realms/Pos-system-realm

      client:
        registration:
          keycloak:
            client-id: Pos-system-auth
            client-secret: eoDCZYdXolTVPALLPj1hJixIQSxFwlUs
            provider: keycloak
            authorization-grant-type: authorization_code
            redirect-uri: https://oauth.pstmn.io/v1/callback
        provider:
          keycloak:
            issuer-uri: http://localhost:8280/realms/Pos-system-realm
            token-endpoint: http://localhost:8280/realms/Pos-system-realm/protocol/openid-connect/token
            authorization-endpoint: http://localhost:8280/realms/Pos-system-realm/protocol/openid-connect/auth


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always

  health:
    circuitbreakers:
      enabled: true

  metrics:
    tags:
      application: gateway-service

resilience4j:
  circuitbreaker:
    instances:
      catalog-service:
        registerHealthIndicator: true
        eventConsumerBufferSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED